on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:

name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::lintr
            local::.
          needs: lint

      - name: Lint package
        run: |
          lintr::lint_package(
            exclusions = list.files("vignettes", full.names = TRUE),
            linters = lintr::all_linters(indentation_linter = NULL)
          )
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      VDIFFR_RUN_TESTS: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::vdiffr
            local::.
          needs: test

      - name: Run test suite
        run: devtools::test(reporter = "summary")
        shell: Rscript {0}

  r-cmd-check:
    runs-on: ${{ matrix.config.os }}
    name: R-CMD-check (${{ matrix.config.os }}, R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
      VDIFFR_RUN_TESTS: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::vdiffr
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  ci-required:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - test
      - r-cmd-check
    steps:
      - name: Fail if any required job failed
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "r-cmd-check=${{ needs.r-cmd-check.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.r-cmd-check.result }}" != "success" ]; then
            exit 1
          fi
